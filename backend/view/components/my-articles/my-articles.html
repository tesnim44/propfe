<!-- ══ MY ARTICLES VIEW ════════════════════════════════════ -->
<div class="view-panel" id="view-articles">

  <div class="view-header flex-between">
    <div>
      <h1>My Articles</h1>
      <p class="view-subtitle">Manage and track your published content</p>
    </div>
    <button class="btn btn-primary"
            onclick="IBlog.Dashboard.navigateTo('write')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Article
    </button>
  </div>

  <!-- Stats rapides -->
  <div class="my-articles-stats">
    <div class="ma-stat">
      <span class="ma-stat__val" id="ma-count">—</span>
      <span class="ma-stat__lbl">Published</span>
    </div>
    <div class="ma-stat">
      <span class="ma-stat__val" id="ma-views">—</span>
      <span class="ma-stat__lbl">Total Views</span>
    </div>
    <div class="ma-stat">
      <span class="ma-stat__val" id="ma-likes">—</span>
      <span class="ma-stat__lbl">Total Likes</span>
    </div>
  </div>

  <!-- Liste des articles (remplie par JS) -->
  <div id="my-articles-list"></div>

</div>


<!-- ══ SETTINGS VIEW ════════════════════════════════════════ -->
<div class="view-panel" id="view-settings">

  <div class="view-header">
    <h1>Settings</h1>
    <p class="view-subtitle">Manage your account and preferences</p>
  </div>

  <!-- Account -->
  <div class="section-card">
    <h3>Account</h3>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="settings-name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="settings-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea style="resize:vertical" rows="3"
                placeholder="Tell your story…"></textarea>
    </div>
    <button class="btn btn-primary"
            onclick="IBlog.utils.toast('Settings saved.', 'success')">
      Save Changes
    </button>
  </div>

  <!-- Premium -->
  <div class="section-card">
    <div class="flex-between">
      <div>
        <h3>Premium Plan</h3>
        <p id="premium-status-text"
           style="font-size:13px;color:var(--text2);margin-top:4px">
          You are on the Free plan.
        </p>
      </div>
      <button class="btn btn-premium"
              id="premium-settings-btn"
              onclick="IBlog.Auth.demoLogin('premium')">
        Upgrade
      </button>
    </div>
  </div>

  <!-- Notifications -->
  <div class="section-card">
    <h3 style="margin-bottom:14px">Notifications</h3>
    <div style="display:flex;flex-direction:column;gap:13px">

      <div class="flex-between">
        <span style="font-size:14px">New followers</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <div class="toggle-track"></div>
        </label>
      </div>

      <div class="flex-between">
        <span style="font-size:14px">Article likes</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <div class="toggle-track"></div>
        </label>
      </div>

      <div class="flex-between">
        <span style="font-size:14px">Weekly digest</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <div class="toggle-track"></div>
        </label>
      </div>

    </div>
  </div>

</div>
